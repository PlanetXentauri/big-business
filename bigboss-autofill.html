<!-- ============================================================
     BIG BUSINESS — "Autofill Contact from Link" (Apify)
     Paste this ENTIRE block into index.html, right before </body>.
     Works with your existing addContact() + ct-* input fields.
     Quick-and-dirty mode: your Apify token is stored in the browser.
     ============================================================ -->
<style>
  #bbaf-fab{position:fixed;right:18px;bottom:18px;z-index:99999;
    background:#E8B64C;color:#0a0a0d;border:none;border-radius:999px;
    padding:12px 16px;font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,.5);font-family:inherit}
  #bbaf-panel{position:fixed;right:18px;bottom:70px;z-index:99999;width:320px;
    background:#141419;color:#eee;border:1px solid #2a2a33;border-radius:14px;
    padding:14px;display:none;box-shadow:0 10px 30px rgba(0,0,0,.6);
    font-family:inherit;font-size:13px}
  #bbaf-panel h4{margin:0 0 8px;font-size:14px;color:#E8B64C}
  #bbaf-panel input{width:100%;box-sizing:border-box;margin:4px 0;padding:9px;
    background:#0a0a0d;border:1px solid #2a2a33;border-radius:8px;color:#eee;font-size:13px}
  #bbaf-panel button{width:100%;margin-top:6px;padding:10px;border:none;border-radius:8px;
    font-weight:700;cursor:pointer;font-size:13px;font-family:inherit}
  #bbaf-go{background:#1fd3ee;color:#0a0a0d}
  #bbaf-savetok{background:#2a2a33;color:#eee}
  #bbaf-status{margin-top:8px;font-size:12px;color:#9aa;min-height:16px;white-space:pre-wrap}
  #bbaf-tokwrap{border-top:1px solid #2a2a33;margin-top:10px;padding-top:8px}
  #bbaf-tokwrap.hidden{display:none}
  .bbaf-filled{outline:2px solid #E8B64C !important;transition:outline .3s}
</style>

<button id="bbaf-fab">⚡ Autofill</button>
<div id="bbaf-panel">
  <h4>⚡ Autofill Contact from Link</h4>
  <div style="font-size:12px;color:#9aa;margin-bottom:6px">
    Open a business → Contacts → start a new contact, then paste a
    <b>Google&nbsp;Maps</b> link or a company <b>website</b> and hit Autofill.
  </div>
  <input id="bbaf-url" placeholder="Paste Google Maps link or website URL">
  <button id="bbaf-go">Autofill →</button>
  <div id="bbaf-status"></div>
  <div id="bbaf-tokwrap">
    <div style="font-size:12px;color:#9aa;margin-bottom:2px">Apify API token (saved on this device):</div>
    <input id="bbaf-token" placeholder="apify_api_..." autocomplete="off">
    <button id="bbaf-savetok">Save token</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  var TOKEN_KEY = "bigboss_apify_token";
  var MAPS_ACTOR = "compass~crawler-google-places";
  var SITE_ACTOR = "vdrmota~contact-info-scraper";

  var $ = function(id){ return document.getElementById(id); };
  var getToken = function(){ try{ return localStorage.getItem(TOKEN_KEY) || ""; }catch(e){ return ""; } };
  var setToken = function(t){ try{ localStorage.setItem(TOKEN_KEY, t); }catch(e){} };
  var status = function(msg){ $("bbaf-status").textContent = msg; };

  // ---- Is this a Google Maps link? ----
  function isMapsUrl(u){
    return /google\.[a-z.]+\/maps|maps\.app\.goo\.gl|goo\.gl\/maps|maps\.google\./i.test(u);
  }

  // ---- Call an Apify actor synchronously and get the dataset items back ----
  async function runActor(actor, input){
    var token = getToken();
    if(!token) throw new Error("No Apify token saved. Add it at the bottom of this panel.");
    var url = "https://api.apify.com/v2/acts/" + actor +
              "/run-sync-get-dataset-items?token=" + encodeURIComponent(token) +
              "&clean=true&format=json";
    var res = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(input)
    });
    if(!res.ok){
      var txt = await res.text().catch(function(){return "";});
      throw new Error("Apify error " + res.status + (txt ? (": " + txt.slice(0,180)) : ""));
    }
    return await res.json();
  }

  // ---- Normalize each source into one shape ----
  function normMaps(it){
    if(!it) return null;
    var addr = it.address ||
      [it.street, it.city, it.state, it.postalCode].filter(Boolean).join(", ");
    return {
      name: it.title || "",
      role: it.categoryName || "Business",
      phone: it.phone || it.phoneUnformatted || "",
      email: (it.emails && it.emails[0]) || "",
      website: it.website || "",
      address: addr || "",
      socials: pickSocials(it)
    };
  }
  function normSite(it, fallbackUrl){
    if(!it) return null;
    var phones = (it.phones && it.phones.length ? it.phones : it.phonesUncertain) || [];
    return {
      name: "",                       // websites rarely expose a clean business name
      role: "Business",
      phone: phones[0] || "",
      email: (it.emails && it.emails[0]) || "",
      website: it.originalStartUrl || it.domain || fallbackUrl || "",
      address: "",
      socials: pickSocials(it)
    };
  }
  function pickSocials(it){
    var s = {};
    var grab = function(arr){ return (arr && arr.length) ? arr[0] : ""; };
    if(it.linkedIns) s.LinkedIn = grab(it.linkedIns);
    if(it.facebooks) s.Facebook = grab(it.facebooks);
    if(it.instagrams) s.Instagram = grab(it.instagrams);
    if(it.twitters) s.X = grab(it.twitters);
    if(it.youtubes) s.YouTube = grab(it.youtubes);
    if(it.tiktoks) s.TikTok = grab(it.tiktoks);
    return s;
  }

  // ---- Build the Notes text so nothing found gets lost ----
  function buildNotes(d){
    var lines = [];
    if(d.website) lines.push("Website: " + d.website);
    if(d.address) lines.push("Address: " + d.address);
    var soc = Object.keys(d.socials || {}).filter(function(k){ return d.socials[k]; });
    soc.forEach(function(k){ lines.push(k + ": " + d.socials[k]); });
    return lines.join("  |  ");
  }

  // ---- Make sure the contact form is open (uses your app's globals) ----
  function ensureContactForm(){
    try{
      if(window.ui && window.ui.showForm){
        window.ui.showForm.ct = true;
        if(typeof window.render === "function") window.render();
      }
    }catch(e){/* app internals may differ; user can open the form manually */}
  }

  function setField(id, val){
    var el = $(id);
    if(el && val){
      el.value = val;
      el.classList.add("bbaf-filled");
      setTimeout(function(){ el.classList.remove("bbaf-filled"); }, 1500);
      return true;
    }
    return false;
  }

  // ---- Drop the data into your ct-* inputs ----
  function fillContact(d){
    ensureContactForm();
    if(!$("ct-name")){
      return false; // form not on screen
    }
    setField("ct-name",  d.name);
    setField("ct-role",  d.role);
    setField("ct-phone", d.phone);
    setField("ct-email", d.email);
    setField("ct-notes", buildNotes(d));
    return true;
  }

  // ---- Main action ----
  async function autofill(){
    var raw = $("bbaf-url").value.trim();
    if(!raw){ status("Paste a link first."); return; }
    if(!getToken()){ status("Add your Apify token below first."); return; }

    var isMaps = isMapsUrl(raw);
    status((isMaps ? "Reading Google Maps listing" : "Reading website") + "… (10–40s)");

    try{
      var items, data;
      if(isMaps){
        items = await runActor(MAPS_ACTOR, {
          startUrls: [{ url: raw }],
          maxCrawledPlacesPerSearch: 1,
          scrapeContacts: true,   // also pull email/socials from the business website
          language: "en",
          maxReviews: 0, maxImages: 0
        });
        data = normMaps(items && items[0]);
      } else {
        items = await runActor(SITE_ACTOR, {
          startUrls: [{ url: raw }],
          maxDepth: 1,
          maxRequestsPerStartUrl: 10,
          mergeContacts: true,
          proxyConfig: { useApifyProxy: true }
        });
        data = normSite(items && items[0], raw);
      }

      if(!data){ status("Nothing found for that link. Try the other type of link."); return; }

      var ok = fillContact(data);
      if(ok){
        status("✓ Filled: " + (data.name || data.website || "contact") +
               ".\nReview the fields, then click 💾 SAVE CONTACT.");
      } else {
        // Form isn't open — show what we found so nothing is lost.
        status("Found it, but no contact form is open.\nOpen a business → Contacts → new contact, then Autofill again.\n\n" +
               [data.name && ("Name: "+data.name),
                data.phone && ("Phone: "+data.phone),
                data.email && ("Email: "+data.email),
                data.website && ("Web: "+data.website),
                data.address && ("Addr: "+data.address)
               ].filter(Boolean).join("\n"));
      }
    }catch(err){
      var m = String(err && err.message || err);
      if(/Failed to fetch|CORS|NetworkError/i.test(m)){
        status("Network/CORS blocked the request.\nTell Claude and we'll switch to the tiny proxy version.");
      } else {
        status("⚠ " + m);
      }
    }
  }

  // ---- Wire up the UI ----
  function init(){
    $("bbaf-fab").addEventListener("click", function(){
      var p = $("bbaf-panel");
      p.style.display = (p.style.display === "block") ? "none" : "block";
      // hide the token box once a token exists
      $("bbaf-tokwrap").classList.toggle("hidden", !!getToken());
      if(getToken()) $("bbaf-token").value = "";
    });
    $("bbaf-go").addEventListener("click", autofill);
    $("bbaf-url").addEventListener("keydown", function(e){ if(e.key === "Enter") autofill(); });
    $("bbaf-savetok").addEventListener("click", function(){
      var t = $("bbaf-token").value.trim();
      if(!t){ status("Paste your token first."); return; }
      setToken(t);
      $("bbaf-tokwrap").classList.add("hidden");
      status("✓ Token saved on this device.");
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else { init(); }
})();
</script>
