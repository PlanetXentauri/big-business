<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Business · Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Business">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0d;
  --panel: rgba(255,255,255,0.025);
  --border: rgba(255,255,255,0.08);
  --gold: #d9a844;
  --gold-dim: rgba(217,168,68,0.12);
  --text: #e2e8f0;
  --muted: #64748b;
  --faint: #334155;
  --green: #10b981;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --cyan: #1fd3ee;
  --accent: #d9a844;          /* switches per business in render() */
  --accent-dim: rgba(217,168,68,0.12);
  --accent-brd: rgba(217,168,68,0.35);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
}
h1,h2,h3,.syne { font-family: 'Syne', sans-serif; }
button, input, select, textarea { font-family: inherit; }
input, select, textarea {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 9px 12px; color: var(--text); font-size: 13px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
::placeholder { color: #475569; }
.btn {
  border: none; border-radius: 6px; padding: 9px 14px; font-size: 11px;
  font-weight: 600; cursor: pointer; letter-spacing: 0.06em;
  font-family: 'DM Mono', monospace;
}
.btn-red { background: var(--accent); color: #0d0d10; }
.btn-ghost { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
.btn-dashed {
  background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.14);
  color: var(--muted); width: 100%; padding: 10px; border-radius: 8px;
  cursor: pointer; font-size: 11px; letter-spacing: 0.08em;
}
.btn-dashed:hover { border-color: var(--accent); color: var(--accent); }
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.chip {
  font-size: 9px; letter-spacing: 0.18em; padding: 2px 7px; border-radius: 4px;
  display: inline-block;
}
.section-title { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); margin: 4px 0 12px; }
.del-x {
  background: transparent; border: none; color: #475569; font-size: 14px;
  cursor: pointer; padding: 2px 6px; opacity: 0.55;
}
.del-x:hover { color: #ef4444; opacity: 1; }
.empty {
  padding: 30px 16px; text-align: center; color: var(--muted); font-size: 12px;
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px;
}
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes fadeout { to { opacity: 0; visibility: hidden; } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ===== Splash ===== */
#splash {
  position: fixed; inset: 0; background: #050506; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeout 0.7s ease 1.5s forwards;
}
#splash .logo-wrap { width: min(560px, 86vw); }

/* ===== Watermark ===== */
#watermark {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0; opacity: 0.05;
}
#watermark .logo-wrap { width: min(520px, 85vw); }

/* ===== Layout ===== */
#shell { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 26px 16px 60px; }
header.app { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
header.app .logo-wrap { width: min(440px, 86vw); margin: 0 auto; cursor: pointer; }
.biz-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.biz-tab {
  padding: 13px 10px; border-radius: 10px; cursor: pointer; text-align: center;
  border: 1px solid var(--border); background: var(--panel);
  font-size: 12px; letter-spacing: 0.12em; color: var(--muted); font-weight: 600;
  transition: all .2s;
}
.biz-tab.active { color: #fff; }
.sub-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.sub-tab {
  padding: 7px 12px; border-radius: 999px; cursor: pointer; font-size: 10px;
  letter-spacing: 0.1em; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
}
.sub-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.stat {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 10px; text-align: center;
}
.stat .lbl { font-size: 10px; color: var(--faint); letter-spacing: 0.1em; margin-bottom: 6px; }
.stat .val { font-family: 'DM Mono', monospace; font-size: 19px; font-weight: 500; }
.row { display: flex; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.form-panel {
  background: var(--accent-dim); border: 1px solid var(--accent-brd);
  border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 9px;
  margin-bottom: 12px;
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
</style>
</head>
<body>

<div id="splash"><div class="logo-wrap"></div></div>
<div id="watermark"><div class="logo-wrap"></div></div>
<div id="shell">
  <header class="app">
    <div class="logo-wrap" id="headerLogo" title="Click to upload your logo PNG"></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(217,168,68,0.45))"></div>
      <div style="font-size:10px;letter-spacing:0.34em;color:var(--gold);">MASTER BUSINESS DASHBOARD</div>
      <div style="height:1px;flex:1;background:linear-gradient(90deg,rgba(217,168,68,0.45),transparent)"></div>
    </div>
  </header>
  <input type="file" id="logoFile" accept="image/*" style="display:none">
  <input type="file" id="catFile" accept=".json,application/json" style="display:none">
  <input type="file" id="docFile" multiple style="display:none">
  <div class="biz-tabs" id="bizTabs"></div>
  <div class="sub-tabs" id="subTabs"></div>
  <div id="content"></div>
  <div style="margin-top:32px;display:flex;justify-content:center;gap:8px">
    <button class="btn btn-ghost" style="font-size:9px;padding:5px 10px" onclick="exportData()">⬇ EXPORT DATA</button>
    <button class="btn btn-ghost" style="font-size:9px;padding:5px 10px" onclick="document.getElementById('dataFile').click()">⬆ IMPORT DATA</button>
  </div>
  <input type="file" id="dataFile" accept=".json,application/json" style="display:none">
  <div style="margin-top:14px;text-align:center;font-size:10px;letter-spacing:0.2em;color:#1e293b;" id="footer"></div>
</div>

<script>
// ==================================================
// BIG BUSINESS — dual business dashboard
// Centauri World LLC + Keypr On Company
// All data lives in localStorage on this machine.
// ==================================================
const LS_KEY = "bigboss_dashboard_v1";
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ---------- Default logo (SVG recreation of "BIG BUSINESS" gold wordmark) ----------
let _logoN = 0;
function logoSVG() {
  const g = "gg" + (_logoN++); // unique gradient ids per instance
  return `
  <svg viewBox="0 0 970 190" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
    <defs>
      <linearGradient id="${g}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fdf0b0"/>
        <stop offset="30%" stop-color="#e9c561"/>
        <stop offset="52%" stop-color="#a5761f"/>
        <stop offset="66%" stop-color="#e3b64e"/>
        <stop offset="85%" stop-color="#c1922f"/>
        <stop offset="100%" stop-color="#6e4f14"/>
      </linearGradient>
      <linearGradient id="${g}e" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff6cf"/>
        <stop offset="100%" stop-color="#3c2a08"/>
      </linearGradient>
    </defs>
    <text x="485" y="132" text-anchor="middle"
      font-family="Cinzel, 'Times New Roman', Georgia, serif" font-weight="700"
      font-size="118" letter-spacing="4"
      fill="url(#${g})" stroke="url(#${g}e)" stroke-width="1.6">BIG BUSINESS</text>
  </svg>`;
}
function logoHTML() {
  const s = state();
  if (s && s.logo) return `<img src="${s.logo}" style="width:100%;display:block" alt="The Big Boss logo">`;
  return logoSVG();
}

// ---------- Businesses ----------
const BIZ = {
  centauri: { name: "CENTAURI WORLD LLC", short: "Centauri", accent: "#C4993A" },
  keypr:    { name: "KEYPR ON COMPANY",  short: "Keypr",    accent: "#1fd3ee" },
};
const TABS = [
  ["profile","PROFILE"],["projects","PROJECTS"],["catalog","PRODUCTS"],["financials","FINANCIALS"],
  ["deadlines","DEADLINES"],["contacts","CONTACTS"],["notes","NOTES"],
];

// ---------- Keypr On wordmark (logo colors: neon cyan + red) ----------
function keyprLogoSVG() {

  <svg viewBox="0 0 460 68" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block" aria-label="Keypr On co.">
    <text x="230" y="48" text-anchor="middle" font-family="Cinzel, 'Times New Roman', Georgia, serif" font-weight="700" font-size="38"
      textLength="420" lengthAdjust="spacingAndGlyphs"><tspan fill="#25d7f2">KEYPR ON </tspan><tspan fill="#ff8c2e">co.</tspan></text>
  </svg>`;
}

const STATUS_META = {
  "in-progress": { label: "IN PROGRESS", priority: "🔴 HIGH",  accent: "#3b82f6" },
  "issue":       { label: "NEEDS ACTION", priority: "🟡 MEDIUM", accent: "#f59e0b" },
  "nearly-done": { label: "NEARLY DONE", priority: "🟢 LOW",   accent: "#10b981" },
  "new":         { label: "NEW PROJECT", priority: "⚪ TBD",    accent: "#8b5cf6" },
};
const STEP_COLORS = {
  done:    { bg: "rgba(16,185,129,0.12)", border: "#10b981", text: "#10b981" },
  waiting: { bg: "rgba(245,158,11,0.12)", border: "#f59e0b", text: "#f59e0b" },
  upcoming:{ bg: "rgba(255,255,255,0.02)", border: "rgba(255,255,255,0.07)", text: "#475569" },
};

// ---------- Default data ----------
function defaultState() {
  return {
    logo: null,

    activeTab: "projects",
    openProject: "amazon",
    projects: [

        steps:[
          {id:1,status:"done",label:"Lab Identified",detail:"Intertek — Hillside, IL",sub:"Reese's Law accredited · 1-800-967-5352"},
          {id:2,status:"done",label:"Contact Made",detail:"Info left with receptionist",sub:"Friday, April 24, 2026"},
          {id:3,status:"waiting",label:"Awaiting Callback",detail:"Intertek engineer to call back",sub:"Expected by end of day Tuesday, April 29"},
          {id:4,status:"upcoming",label:"Consultation Call",detail:"Get sample count, quote & schedule",sub:"Ask: How many samples for 16 CFR 1700?"},
          {id:5,status:"upcoming",label:"Order Packaging Samples",detail:"Order exact qty confirmed by lab",sub:"Don't order until lab confirms count"},
          {id:6,status:"upcoming",label:"Drop Off Samples",detail:"Drive to Hillside, IL",sub:"Mon–Fri 8AM–5PM"},
          {id:7,status:"upcoming",label:"Receive Test Report",detail:"16 CFR 1700 certification issued",sub:"2–4 weeks after drop-off"},
          {id:8,status:"upcoming",label:"Submit GCC to Amazon",detail:"GCC + lab report → Amazon",sub:"Listing reinstated after review"},
        ]},
      { id:"walmart-uni2", biz:"centauri", brand:"WALMART", title:"SKU UNI2 · POSCA Monotone",
        subtitle:"Uni POSCA PC-5M 8-Count Monotone · ID: 3406107934", status:"issue",
        steps:[
          {id:1,status:"done",label:"Product Listed",detail:"Listed at $18.88",sub:"Net profit $11.53/unit · 61.1% margin"},
          {id:2,status:"done",label:"Buy Box Tracked",detail:"Competitor: uni-ball Corp (1P) at $19.97",sub:"~71 units/mo demand"},
          {id:3,status:"waiting",label:"Listing Quality Score",detail:"Current score: 61% — needs improvement",sub:"Improve title, images, content"},
          {id:4,status:"upcoming",label:"Confirm Units On Hand",detail:"Verify inventory count in Seller Center",sub:"Update stock levels"},
          {id:5,status:"upcoming",label:"Resolve Processing Issues",detail:"Check for stuck Processing status",sub:"Add price/inventory or retire & relist"},
          {id:6,status:"upcoming",label:"Optimize Listing",detail:"Push Quality Score above 80%",sub:"Title, bullets, images, attributes"},
        ]},
      { id:"walmart-uni5", biz:"centauri", brand:"WALMART", title:"SKU UNI5 · POSCA Assorted",
        subtitle:"Uni POSCA PC-5M 8-Count Assorted · ID: 591166907", status:"issue",
        steps:[
          {id:1,status:"done",label:"Product Listed",detail:"Listed at $19.88",sub:"~457 units/mo demand · 4.7★ (1,715 reviews)"},
          {id:2,status:"done",label:"Competition Mapped",detail:"Walmart 1P at $19.97 · Lowest 3P: $16.97",sub:"Ocean State Office Supply undercutting"},
          {id:3,status:"waiting",label:"Units On Hand = 0",detail:"Currently OUT OF STOCK",sub:"Restock needed immediately — high demand SKU"},
          {id:4,status:"upcoming",label:"Resolve Processing Status",detail:"Listing may be stuck in Processing",sub:"Add inventory + price to activate"},

        ]},
      { id:"centauri-brand", biz:"centauri", brand:"BRAND", title:"Centauri World Brand Identity",
        subtitle:"Logo · Typography · Color System · Assets", status:"nearly-done",

          {id:1,status:"done",label:"Brand Direction Set",detail:"Custom dot-sphere globe logo chosen",sub:"Rejected: Crux, Meridian, Binary Orbit concepts"},
          {id:2,status:"done",label:"Color Palette Finalized",detail:"Deep Space · Electric Blue · Stellar Silver · Centauri Gold",sub:"#070B16 · #1A6AE8 · #8A9AB5 · #C4993A"},
          {id:3,status:"done",label:"Typography System",detail:"Outfit Bold (CENTAURI) + Outfit Light (WORLD)",sub:"Body: DM Sans"},
          {id:4,status:"done",label:"14 SVG Files Produced",detail:"Primary, monochrome, icon, stacked, wordmark",sub:"Full production-ready asset suite"},
          {id:5,status:"upcoming",label:"Apply to Walmart Listings",detail:"Use brand assets in product imagery",sub:"Seller Center listing images & storefront"},

        ]},
    ],
    financials: {
      centauri: [
        {id:"f1", label:"UNI2 net profit / unit", value:"$11.53", note:"61.1% margin at $18.88"},
        {id:"f2", label:"UNI5 demand", value:"~457 units/mo", note:"Currently out of stock"},
        {id:"f3", label:"UNI2 demand", value:"~71 units/mo", note:"Buy Box vs uni-ball 1P $19.97"},
      ],
      keypr: [

      ],
    },
    profiles: {
      centauri: {
        legal: "Centauri World LLC", brands: "Centauri World",
        marketplaces: "Walmart Marketplace (Seller Center)",

        colors: "#070B16 Deep Space · #1A6AE8 Electric Blue · #8A9AB5 Stellar Silver · #C4993A Centauri Gold",
        notes: "Typography: Outfit Bold/Light + DM Sans. 14 production SVG assets ready.",
      },
      keypr: {
        legal: "Keypr On Company", brands: "KEYPRONYX",
        marketplaces: "Amazon Seller Central",
        ids: "CR2032 coin cell product line",
        colors: "",
        notes: "Compliance path: 16 CFR 1700 via Intertek (Hillside, IL) → GCC → Amazon reinstatement.",
      },
    },
    deadlines: [
      {id:"d1", biz:"keypr", title:"Intertek engineer callback", date:"2026-04-29", note:"Follow up if no call by EOD", done:true},
    ],
    contacts: [
      {id:"c1", biz:"keypr", name:"Intertek — Hillside, IL", role:"Compliance Lab", phone:"1-800-967-5352", email:"", notes:"Reese's Law accredited. Spoke to receptionist 4/24."},
    ],
    links: [],
    notes: [],
    catalog: { centauri: [], keypr: [] },
    catalogMeta: {
      centauri: { lastSync: null, source: "", srcUrl: "" },
      keypr:    { lastSync: null, source: "", srcUrl: "" },
    },
    docs: null, // filled by migrate()
  };
}
function defaultDnb() {
  return [
    { id: uid("dnb"), label: "D&B Business Directory — company search", url: "https://www.dnb.com/business-directory.html" },
    { id: uid("dnb"), label: "D-U-N-S Number lookup / request", url: "https://www.dnb.com/duns-number/lookup.html" },
  ];
}

// ---------- State ----------
let _state = null;
function state() { return _state; }
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { _state = JSON.parse(raw); migrate(); return; }
  } catch(e) {}
  _state = defaultState();
  migrate();
}
function migrate() { // add keys introduced after first release
  _state.catalog ||= { centauri: [], keypr: [] };
  _state.catalogMeta ||= {};
  _state.docs ||= {};
  for (const b of ["centauri","keypr"]) {
    _state.catalog[b] ||= [];
    _state.catalogMeta[b] ||= { lastSync: null, source: "", srcUrl: "" };
    _state.docs[b] ||= { files: [], links: [], dnb: defaultDnb(), scan: { files: [], lastScan: null, folderName: "" } };
  }
}
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch(e) { console.error(e); } }
function commit() { save(); render(); }
const uid = p => p + "-" + Date.now() + "-" + Math.floor(Math.random()*1000);

// UI-only flags (not persisted)
let ui = { showNewProject:false, addStepFor:null, showForm:{}, contactTab:"list", editProd:null, catStatus:"" };

// ---------- Renderers ----------
function render() {
  // per-business accent: gold for Centauri, neon cyan for Keypr On
  const a = BIZ[_state.activeBiz].accent;
  const rt = document.documentElement.style;
  rt.setProperty("--accent", a);
  rt.setProperty("--accent-dim", a + "1f");
  rt.setProperty("--accent-brd", a + "59");
  renderLogos(); renderBizTabs(); renderSubTabs();
  const s = _state;
  const el = document.getElementById("content");
  const fn = { projects: rProjects, catalog: rCatalog, financials: rFinancials, deadlines: rDeadlines,
               contacts: rContacts, notes: rNotes, profile: rProfile }[s.activeTab] || rProjects;
  el.innerHTML = fn(s.activeBiz);
  document.getElementById("footer").textContent =
    "CENTAURI WORLD LLC · KEYPR ON COMPANY · " +
    new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"}).toUpperCase();
}
function renderLogos() {
  document.querySelectorAll("header .logo-wrap, #splash .logo-wrap").forEach(w => w.innerHTML = logoHTML());
  // watermark: custom photo background if set, otherwise the BIG BUSINESS wordmark
  const wm = document.getElementById("watermark");
  if (_state.bg) {
    wm.style.opacity = "0.16";
    wm.innerHTML = `<img src="${_state.bg}" style="width:100%;height:100%;object-fit:cover" alt="">`;
  } else {
    wm.style.opacity = "0.05";
    wm.innerHTML = `<div class="logo-wrap" style="width:min(520px,85vw)">${logoHTML()}</div>`;
  }
}
function renderBizTabs() {
  const s = _state;
  document.getElementById("bizTabs").innerHTML = Object.entries(BIZ).map(([id,b]) => {
    const active = s.activeBiz === id;
    const mark = "";
    return `<div class="biz-tab ${active?'active':''}" onclick="setBiz('${id}')"
      style="display:flex;align-items:center;justify-content:center;${active?`border-color:${b.accent};background:${b.accent}18;color:${b.accent};`:''}">${mark}<span>${b.name}</span></div>`;
  }).join("");
}
function renderSubTabs() {
  const s = _state;
  document.getElementById("subTabs").innerHTML = TABS.map(([id,label]) => {
    const gold = id==="profile"
      ? `style="border-color:var(--gold);color:var(--gold);${s.activeTab===id?'background:var(--gold-dim);font-weight:700;':''}"`
      : "";
    return `<button class="sub-tab ${s.activeTab===id?'active':''}" ${gold} onclick="setTab('${id}')">${label}</button>`;
  }).join("");
}
function setBiz(id){ _state.activeBiz = id; _state.activeTab = "profile"; ui.showForm = {}; ui.showNewProject=false; ui.addStepFor=null; commit(); }
function setTab(id){ _state.activeTab = id; ui.showForm = {}; ui.showNewProject=false; ui.addStepFor=null; commit(); }

// ========== PROJECTS ==========
function projStats(biz) {
  const ps = _state.projects.filter(p=>p.biz===biz);
  const steps = ps.flatMap(p=>p.steps);
  const done = steps.filter(x=>x.status==="done").length;
  const waiting = steps.filter(x=>x.status==="waiting").length;
  return { pct: steps.length?Math.round(done/steps.length*100):0, done, total: steps.length, waiting };
}
function ring(pct,color,size=48){
  const r=(size-6)/2, c=2*Math.PI*r, o=c-(pct/100)*c;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${c}" stroke-dashoffset="${o}" style="stroke-linecap:round;transition:stroke-dashoffset 1s ease"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
      style="transform:rotate(90deg);transform-origin:50% 50%;fill:${color};font-size:11px;font-weight:600">${pct}%</text>
  </svg>`;

// Pulls from the same centauri-wfs-data.json your WFS Profit Tracker
// auto-saves (Connect Folder once), from an exported tracker JSON, or a URL.
const WFS_FILE = "centauri-wfs-data.json";
const money = n => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

// -- tiny IndexedDB store to persist the folder handle across sessions --
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("bigboss-fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function idbSet(k, v) { const db = await idb(); return new Promise((res,rej)=>{ const t=db.transaction("handles","readwrite"); t.objectStore("handles").put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function idbGet(k) { const db = await idb(); return new Promise((res,rej)=>{ const t=db.transaction("handles","readonly"); const q=t.objectStore("handles").get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }

async function connectWfsFolder() {
  if (!window.showDirectoryPicker) { ui.catStatus = "Folder connect needs Chrome, Edge, or Brave — use UPDATE to pick an exported JSON instead."; render(); return; }
  try {
    const h = await window.showDirectoryPicker({ mode: "read" });
    await idbSet("wfsdir", h);
    ui.catStatus = "Folder connected — click UPDATE to pull " + WFS_FILE;
  } catch(e) { if (e.name !== "AbortError") ui.catStatus = "Couldn't connect folder: " + e.message; }
  render();
}
async function readWfsFromFolder() {
  const h = await idbGet("wfsdir"); if (!h) return null;
  let perm = await h.queryPermission({ mode: "read" });
  if (perm !== "granted") perm = await h.requestPermission({ mode: "read" });
  if (perm !== "granted") return null;
  const fh = await h.getFileHandle(WFS_FILE);
  return JSON.parse(await (await fh.getFile()).text());
}
async function updateCatalog(biz) {
  ui.catStatus = "Updating…"; render();
  // 1) connected tracker folder (Centauri's WFS data file)
  if (biz === "centauri") {
    try { const data = await readWfsFromFolder(); if (data) return applyCatalog(biz, data, "connected folder"); }
    catch(e) { /* fall through */ }
  }
  // 2) configured URL
  const url = _state.catalogMeta[biz].srcUrl;
  if (url) {
    try { const r = await fetch(url, { cache: "no-store" }); if (r.ok) return applyCatalog(biz, await r.json(), "URL"); }
    catch(e) { /* fall through */ }
  }
  // 3) pick an exported tracker JSON
  ui.catStatus = "Pick your tracker JSON (Export button in the tracker, or " + WFS_FILE + ")";
  render();
  const inp = document.getElementById("catFile"); inp.dataset.biz = biz; inp.click();
}
function applyCatalog(biz, data, source) {
  const list = Array.isArray(data) ? data : (data.products || []);
  _state.catalog[biz] = list.map(p => ({
    id: p.id || uid("prod"), name: p.name || "Unnamed product", brand: p.brand || "",
    sku: p.sku || "", itemid: p.itemid || "", gtin: p.gtin || "", url: p.url || "",
    price: Number(p.price)||0, margin: Number(p.margin)||0, qty: Number(p.qty)||0,
    estsales: Number(p.estsales)||0, listingscore: Number(p.listingscore)||0,
    status: p.status || "Published", notes: p.notes || "",
  }));
  const m = _state.catalogMeta[biz];
  m.lastSync = Date.now(); m.source = source;
  m.shipments = Array.isArray(data.shipments) ? data.shipments.length : 0;
  ui.catStatus = "✓ Pulled " + _state.catalog[biz].length + " product(s) from " + source;
  ui.editProd = null; ui.showForm = {};
  commit();
}

// Centauri World logo (SVG recreation: blue dot-sphere globe + wordmark)
function centauriGlobeDots() {
  // regular dot lattice clipped to a sphere, with a circular cut-out on the
  // right that carves the crescent "C" — dots swell toward the sphere's center
  let dots = "";
  const cx=60, cy=60, R=47, step=6.9;
  const kx=cx+R*0.62, kr=R*0.78;
  let row=0;
  for (let y=cy-R+4; y<=cy+R-3; y+=step, row++) {
    const off=(row%2)*step/2;
    for (let x=cx-R+2+off; x<=cx+R; x+=step) {
      const r=Math.hypot(x-cx,y-cy);
      if (r>R-2) continue;                      // outside sphere
      if (Math.hypot(x-kx,y-cy)<kr) continue;    // inside cut-out → crescent
      const s=1.0+2.9*Math.sqrt(Math.max(0,1-(r/R)*(r/R)));
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${s.toFixed(2)}" fill="#1A6AE8"/>`;
    }
  }
  return dots;
}

  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">${centauriGlobeDots()}</svg>`;

      <span>${fileIcon(f.name)}</span>
      <span style="flex:1;min-width:0;font-size:12px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      <span style="font-size:10px;color:#475569;flex-shrink:0">${fmtSize(f.size)} · ${fmtTs(f.mtime)}</span>
    </div>`).join("")+`</div>`;
  // --- Saved files & screenshots ---
  html += `<div style="font-size:10px;letter-spacing:0.2em;color:var(--muted);margin-bottom:8px">SAVED FILES &amp; SCREENSHOTS</div>`;
  if (!D.files.length) html += `<div class="empty" style="margin-bottom:12px;padding:18px">Nothing saved yet — use <b>+ FILES</b> or paste a screenshot.</div>`;
  else html += `<div class="col" style="margin-bottom:12px">`+D.files.map(f=>`
    <div class="card" style="padding:10px 14px;display:flex;gap:10px;align-items:center">
      ${f.dataUri&&f.type.startsWith("image/")?`<img src="${f.dataUri}" style="width:38px;height:38px;object-fit:cover;border-radius:6px;flex-shrink:0;cursor:pointer" onclick="openSavedDoc('${biz}','${f.id}')">`:`<span style="cursor:pointer" onclick="openSavedDoc('${biz}','${f.id}')">${fileIcon(f.name)}</span>`}
      <span style="flex:1;min-width:0;font-size:12px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" onclick="openSavedDoc('${biz}','${f.id}')">${esc(f.name)}${f.ref?` <span style="color:#475569;font-size:10px">(reference only — too big to store)</span>`:""}</span>
      <span style="font-size:10px;color:#475569;flex-shrink:0">${fmtSize(f.size)} · ${fmtTs(f.ts)}</span>
      <button class="del-x" onclick="delDocFile('${biz}','${f.id}')">×</button>
    </div>`).join("")+`</div>`;
  // --- General links ---
  html += `<div style="font-size:10px;letter-spacing:0.2em;color:var(--muted);margin-bottom:8px">LINKS</div>`;
  if (!D.links.length) html += `<div class="empty" style="padding:18px">No links yet — use <b>+ LINK</b>.</div>`;
  else html += `<div class="col">`+D.links.map(l=>`
    <div class="card" style="padding:10px 14px;display:flex;gap:10px;align-items:center">
      <span>🔗</span>
      <a href="${esc(l.url)}" target="_blank" rel="noopener" style="flex:1;min-width:0;font-size:12px;color:#93c5fd;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.label||l.url)}</a>
      <button class="del-x" onclick="delDocLink('${biz}','links','${l.id}')">×</button>
    </div>`).join("")+`</div>`;
  return html;
}
async function connectDocsFolder(biz) {
  if (!window.showDirectoryPicker) { ui.docStatus="Folder connect needs Chrome, Edge, or Brave."; render(); return; }
  try {
    const h = await window.showDirectoryPicker({ mode: "read" });
    await idbSet("docs-"+biz, h);
    _state.docs[biz].scan.folderName = h.name;
    ui.docStatus = "Folder \""+h.name+"\" connected — click ⟳ UPDATE to pull the file list.";
    commit(); return;
  } catch(e) { if (e.name!=="AbortError") ui.docStatus="Couldn't connect folder: "+e.message; }
  render();
}
async function scanDocs(biz) {
  ui.docStatus = "Scanning…"; render();
  try {
    const h = await idbGet("docs-"+biz);
    if (!h) { ui.docStatus="No folder connected yet — click ◇ CONNECT OBSIDIAN FOLDER first."; render(); return; }
    let perm = await h.queryPermission({mode:"read"});
    if (perm!=="granted") perm = await h.requestPermission({mode:"read"});
    if (perm!=="granted") { ui.docStatus="Folder permission was denied."; render(); return; }
    const files = [];
    for await (const entry of h.values()) {
      if (entry.kind!=="file") continue;
      const f = await entry.getFile();
      files.push({ name:f.name, size:f.size, mtime:f.lastModified });
      if (files.length>=300) break;
    }
    files.sort((a,b)=>b.mtime-a.mtime);
    _state.docs[biz].scan = { files, lastScan: Date.now(), folderName: h.name };
    ui.docStatus = "✓ Pulled "+files.length+" file(s) from \""+h.name+"\"";
    commit();
  } catch(e) { ui.docStatus="Scan failed: "+e.message; render(); }
}
async function openScanFile(biz, idx) {
  try {
    const h = await idbGet("docs-"+biz);
    const meta = _state.docs[biz].scan.files[idx];
    const fh = await h.getFileHandle(meta.name);
    const f = await fh.getFile();
    window.open(URL.createObjectURL(f), "_blank");
  } catch(e) { ui.docStatus="Couldn't open file: "+e.message; render(); }
}
function pickDocFiles(biz){ const i=document.getElementById("docFile"); i.dataset.biz=biz; i.click(); }
function addDocFiles(fileList, biz) {
  const files=[...fileList]; if(!files.length) return;
  let pending=files.length;
  files.forEach(f=>{
    const entry={ id:uid("doc"), name:f.name||("screenshot-"+new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")+".png"),
      type:f.type||"", size:f.size, ts:Date.now(), dataUri:null, ref:false };
    if (f.size > 3*1048576) { entry.ref=true; _state.docs[biz].files.unshift(entry); if(--pending===0) finishDocAdd(biz,files.length); return; }
    const r=new FileReader();
    r.onload=()=>{ entry.dataUri=r.result; _state.docs[biz].files.unshift(entry); if(--pending===0) finishDocAdd(biz,files.length); };
    r.readAsDataURL(f);
  });
}
function finishDocAdd(biz,n){
  try { save(); ui.docStatus="✓ Saved "+n+" file(s)."; }
  catch(e){ ui.docStatus="Storage is full — file kept as reference only. Delete some saved files to free space."; }
  render();
}
function delDocFile(biz,id){ _state.docs[biz].files=_state.docs[biz].files.filter(f=>f.id!==id); commit(); }
function openSavedDoc(biz,id){
  const f=_state.docs[biz].files.find(x=>x.id===id);
  if(!f) return;
  if(!f.dataUri){ ui.docStatus="\""+f.name+"\" was too big to store — it's listed as a reference only."; render(); return; }
  fetch(f.dataUri).then(r=>r.blob()).then(b=>window.open(URL.createObjectURL(new Blob([b],{type:f.type||b.type})),"_blank"));
}
function addDocLink(biz){
  const url=document.getElementById("dk-url").value.trim(); if(!url) return;
  const label=document.getElementById("dk-label").value.trim();
  const bucket=document.getElementById("dk-dnb").checked?"dnb":"links";
  _state.docs[biz][bucket].push({ id:uid("lnk"), label, url: /^https?:\/\//i.test(url)?url:"https://"+url });
  ui.showForm.dlink=false; commit();
}
function delDocLink(biz,bucket,id){ _state.docs[biz][bucket]=_state.docs[biz][bucket].filter(l=>l.id!==id); commit(); }


// ---------- Logo upload ----------
document.getElementById("headerLogo").addEventListener("click", ()=>document.getElementById("logoFile").click());
document.getElementById("logoFile").addEventListener("change", e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ _state.logo=r.result; commit(); };
  r.readAsDataURL(f);
});
document.getElementById("catFile").addEventListener("change", e=>{
  const f=e.target.files[0], biz=e.target.dataset.biz||"centauri";
  e.target.value=""; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try { applyCatalog(biz, JSON.parse(r.result), "file import"); }
    catch(err){ ui.catStatus="Couldn't read that file as tracker JSON: "+err.message; render(); } };
  r.readAsText(f);
});
document.getElementById("docFile").addEventListener("change", e=>{
  const biz=e.target.dataset.biz||_state.activeBiz;
  addDocFiles(e.target.files, biz); e.target.value="";
});
// paste a screenshot while on the Profile page → saved files
document.addEventListener("paste", e=>{
  if (_state.activeTab!=="profile") return;
  const imgs=[...(e.clipboardData?.files||[])].filter(f=>f.type.startsWith("image/"));
  if (imgs.length) { e.preventDefault(); addDocFiles(imgs, _state.activeBiz); }
});

// ---------- Data backup: move your data between devices ----------
function exportData(){
  const blob = new Blob([JSON.stringify(_state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "big-business-data-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
}
document.getElementById("dataFile").addEventListener("change", e=>{
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try {
      const s=JSON.parse(r.result);
      if(!s.projects || !s.profiles) throw new Error("not a Big Business backup");
      if(!confirm("Replace ALL current data with this backup?")) return;
      _state=s; migrate(); commit();
      alert("Data imported.");
    } catch(err){ alert("Couldn't import: "+err.message); }
  };
  r.readAsText(f);
});

load();
render();
setTimeout(()=>{ const sp=document.getElementById("splash"); if(sp) sp.remove(); }, 2400);

  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
