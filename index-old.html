<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Business · Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Business">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0d;
  --panel: rgba(255,255,255,0.025);
  --border: rgba(255,255,255,0.08);
  --gold: #E8B64C;
  --gold-dim: rgba(232,182,76,0.12);
  --text: #e2e8f0;
  --muted: #9aa7bd;
  --faint: #9aa8c2;
  --green: #10b981;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --cyan: #1fd3ee;
  --accent: #E8B64C;          /* switches per business in render() */
  --accent-dim: rgba(232,182,76,0.12);
  --accent-brd: rgba(232,182,76,0.35);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
}
h1,h2,h3,.syne { font-family: 'Syne', sans-serif; }
button, input, select, textarea { font-family: inherit; }
input, select, textarea {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 9px 12px; color: var(--text); font-size: 15px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
::placeholder { color: #8794ab; }
.btn {
  border: none; border-radius: 6px; padding: 9px 14px; font-size: 13px;
  font-weight: 800; cursor: pointer; letter-spacing: 0.06em;
  font-family: 'DM Mono', monospace;
}
.btn-red { background: var(--accent); color: #0d0d10; }
.btn-ghost { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
.btn-dashed {
  background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.14);
  color: var(--muted); width: 100%; padding: 10px; border-radius: 8px;
  cursor: pointer; font-size: 13px; letter-spacing: 0.08em;
}
.btn-dashed:hover { border-color: var(--accent); color: var(--accent); }
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.chip {
  font-size: 11px; letter-spacing: 0.18em; padding: 2px 7px; border-radius: 4px;
  display: inline-block; font-weight: 700;
}
.section-title { font-size: 12px; letter-spacing: 0.3em; color: #94a3b8; font-weight: 700; margin: 4px 0 12px; }
.del-x {
  background: transparent; border: none; color: #8794ab; font-size: 16px;
  cursor: pointer; padding: 2px 6px; opacity: 0.55;
}
.del-x:hover { color: #ef4444; opacity: 1; }
.empty {
  padding: 30px 16px; text-align: center; color: var(--muted); font-size: 14px;
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px;
}
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes fadeout { to { opacity: 0; visibility: hidden; } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ===== Splash ===== */
#splash {
  position: fixed; inset: 0; background: #050506; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeout 0.7s ease 1.5s forwards;
}
#splash .logo-wrap { width: min(560px, 86vw); }

/* ===== Watermark ===== */
#watermark {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0; opacity: 0.05;
}
#watermark .logo-wrap { width: min(520px, 85vw); }

/* ===== Layout ===== */
#shell { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 26px 16px 60px; }
header.app { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
header.app .logo-wrap { width: min(440px, 86vw); margin: 0 auto; cursor: pointer; }
.biz-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.biz-tab {
  padding: 13px 10px; border-radius: 10px; cursor: pointer; text-align: center;
  border: 1px solid var(--border); background: var(--panel);
  font-size: 14px; letter-spacing: 0.12em; color: var(--muted); font-weight: 800;
  transition: all .2s;
}
.biz-tab.active { color: #fff; }
.sub-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.sub-tab {
  padding: 7px 12px; border-radius: 999px; cursor: pointer; font-size: 12px;
  letter-spacing: 0.1em; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-weight: 700;
}
.sub-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.stat {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 10px; text-align: center;
}
.stat .lbl { font-size: 12px; color: var(--faint); letter-spacing: 0.1em; margin-bottom: 6px; }
.stat .val { font-family: 'DM Mono', monospace; font-size: 23px; font-weight: 800; }
.row { display: flex; gap: 8px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.form-panel {
  background: var(--accent-dim); border: 1px solid var(--accent-brd);
  border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 9px;
  margin-bottom: 12px;
}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
#bgCorner { position: fixed; right: 14px; bottom: 12px; z-index: 50; display: flex; gap: 6px; opacity: 0.4; transition: opacity .2s; }
#bgCorner:hover { opacity: 1; }
</style>
</head>
<body>

<div id="splash"><div class="logo-wrap"></div></div>
<div id="watermark"><div class="logo-wrap"></div></div>

  <header class="app">

      <div style="height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(232,182,76,0.45))"></div>
      <div style="font-size:12px;letter-spacing:0.34em;color:var(--gold);font-weight:800;">MASTER BUSINESS DASHBOARD</div>

    </div>

  <input type="file" id="logoFile" accept="image/*" style="display:none">

  <input type="file" id="afPdf" accept="application/pdf,.pdf" style="display:none">
  <input type="file" id="skFile" multiple style="display:none">
  <div class="biz-tabs" id="bizTabs"></div>
  <div class="sub-tabs" id="subTabs"></div>
  <div id="content"></div>
  <div style="margin-top:32px;display:flex;justify-content:center;gap:8px">
    <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="exportData()">💾 EXPORT DATA</button>
    <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="document.getElementById('dataFile').click()">📥 IMPORT DATA</button>

  </div>
  <div id="cloudPanel" style="max-width:600px;margin:10px auto 0"></div>
  <input type="file" id="dataFile" accept=".json,application/json" style="display:none">
  <input type="file" id="bgFile" accept="image/*" style="display:none">
  <div style="margin-top:14px;text-align:center;font-size:12px;letter-spacing:0.2em;color:#1e293b;" id="footer"></div>
</div>
<div id="bgCorner"></div>

<script>

function defaultDnb() {
  return [
    { id: uid("dnb"), label: "D&B Business Directory — company search", url: "https://www.dnb.com/business-directory.html" },

// ---------- State ----------
let _state = null;
function state() { return _state; }
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { _state = JSON.parse(raw); migrate(); return; }
  } catch(e) {}
  _state = defaultState();
  migrate();
}
function migrate() { // add keys introduced after first release
  _state.catalog ||= { centauri: [], keypr: [] };
  _state.catalogMeta ||= {};
  _state.docs ||= {};
  _state.bp ||= {};
  _state.fin ||= {};
  _state.strength ||= {};
  _state.strengthData ||= {};
  _state.strengthFiles ||= {};
  _state.tabNames ||= {};
  _state.bizNames ||= {};
  for (const b of ["centauri","keypr"]) {
    _state.fin[b] ||= {};
    _state.strength[b] ||= {};
    _state.strengthData[b] ||= {};
    _state.strengthFiles[b] ||= {};
    _state.catalog[b] ||= [];
    _state.catalogMeta[b] ||= { lastSync: null, source: "", srcUrl: "" };
    _state.docs[b] ||= { files: [], links: [], dnb: defaultDnb(), scan: { files: [], lastScan: null, folderName: "" } };
    _state.bp[b] ||= {};
    const old = _state.profiles && _state.profiles[b];
    if (old) { // carry legacy profile values into the structured profile
      const m = _state.bp[b];
      m.legalName ||= old.legal || ""; m.brands ||= old.brands || "";
      m.colors ||= old.colors || ""; m.notes ||= old.notes || "";
      m.marketplaces ||= old.marketplaces || ""; m.keyIds ||= old.ids || "";
    }
  }
}
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch(e) { console.error(e); } scheduleCloudWrite(); }

// ===== CLOUD SYNC (Firebase — same pattern as the WFS tracker) =====
const CLOUD_CFG_KEY = "bigboss_cloud_cfg", CLOUD_CODE_KEY = "bigboss_cloud_code";
const CLIENT_ID = (()=>{ let c=localStorage.getItem("bigboss_client_id"); if(!c){ c=Date.now().toString(36)+Math.random().toString(36).slice(2,8); try{localStorage.setItem("bigboss_client_id",c);}catch(e){} } return c; })();
const FB_APP = "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js";
const FB_AUTH = "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js";
const FB_DB = "https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js";
let cloudDoc = null, cloudWriteTimer = null, cloudApplying = false;
async function cloudConnect(cfg, code){
  await loadScript(FB_APP); await loadScript(FB_AUTH); await loadScript(FB_DB);
  if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(cfg);
  try { await firebase.auth().signInAnonymously(); } catch(e) { /* ok if rules are open */ }
  cloudDoc = firebase.database().ref("trackers/bigboss-" + code);
  cloudDoc.on("value", snap => {
    const v = snap.val();
    if (!v || !v.state || v.origin === CLIENT_ID) return;
    try {
      cloudApplying = true;
      const keepBiz = _state.activeBiz, keepTab = _state.activeTab;
      _state = JSON.parse(v.state);
      _state.activeBiz = keepBiz; _state.activeTab = keepTab; // don't yank this device's view around
      migrate();
      try { localStorage.setItem(LS_KEY, JSON.stringify(_state)); } catch(e) {}
      render();
    } catch(e) { console.error(e); }
    finally { cloudApplying = false; }
  }, err => { ui.cloudMsg = "Cloud read error: " + err.message; render(); });
  try { localStorage.setItem(CLOUD_CFG_KEY, JSON.stringify(cfg)); localStorage.setItem(CLOUD_CODE_KEY, code); } catch(e) {}
}
function scheduleCloudWrite(){
  if (!cloudDoc || cloudApplying) return;
  clearTimeout(cloudWriteTimer);
  cloudWriteTimer = setTimeout(()=>{
    cloudDoc.set({ state: JSON.stringify(_state), updatedAt: Date.now(), origin: CLIENT_ID })
      .catch(e=>{ ui.cloudMsg = "Cloud write failed: " + e.message; });
  }, 1200);
}
function parseCfg(txt){
  try { return JSON.parse(txt); } catch(e) {}
  try { return (new Function("return ("+txt+")"))(); } catch(e) { return null; }
}
async function connectCloudClick(){
  const cfg = parseCfg(document.getElementById("cl-cfg").value.trim());
  const code = document.getElementById("cl-code").value.trim();
  if (!cfg || !cfg.projectId){ ui.cloudMsg = "That config doesn't look right — paste the whole firebaseConfig object (must include projectId)."; render(); return; }
  if (!cfg.databaseURL){ ui.cloudMsg = "Config is missing databaseURL — create the Realtime Database first, then re-copy the config."; render(); return; }
  if (!code){ ui.cloudMsg = "Pick a sync code — it's the shared secret every device enters."; render(); return; }
  ui.cloudMsg = "Connecting…"; render();
  try { await cloudConnect(cfg, code); ui.cloudMsg = "✓ Connected — this device now syncs live."; scheduleCloudWrite(); }
  catch(e){ ui.cloudMsg = "Couldn't connect: " + e.message; }
  render();
}
function disconnectCloud(){
  if (cloudDoc) cloudDoc.off();

const WFS_FILE = "centauri-wfs-data.json";
const money = n => "$" + (Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

// -- tiny IndexedDB store to persist the folder handle across sessions --
function idb() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("bigboss-fs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("handles");
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function idbSet(k, v) { const db = await idb(); return new Promise((res,rej)=>{ const t=db.transaction("handles","readwrite"); t.objectStore("handles").put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function idbGet(k) { const db = await idb(); return new Promise((res,rej)=>{ const t=db.transaction("handles","readonly"); const q=t.objectStore("handles").get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }

async function connectWfsFolder() {
  if (!window.showDirectoryPicker) { ui.catStatus = "Folder connect needs Chrome, Edge, or Brave — use UPDATE to pick an exported JSON instead."; render(); return; }
  try {
    const h = await window.showDirectoryPicker({ mode: "read" });
    await idbSet("wfsdir", h);
    ui.catStatus = "Folder connected — click UPDATE to pull " + WFS_FILE;
  } catch(e) { if (e.name !== "AbortError") ui.catStatus = "Couldn't connect folder: " + e.message; }
  render();
}
async function readWfsFromFolder() {
  const h = await idbGet("wfsdir"); if (!h) return null;
  let perm = await h.queryPermission({ mode: "read" });
  if (perm !== "granted") perm = await h.requestPermission({ mode: "read" });
  if (perm !== "granted") return null;
  const fh = await h.getFileHandle(WFS_FILE);
  return JSON.parse(await (await fh.getFile()).text());
}

    catch(e) { /* fall through */ }

    catch(e) { /* fall through */ }

  render();

}

function saveProd(biz, id){

function daysUntil(d){ return Math.ceil((new Date(d+"T23:59:59") - new Date())/86400000); }
function rDeadlines(biz) {
  const rows=_state.deadlines.filter(d=>d.biz===biz).sort((a,b)=>a.date.localeCompare(b.date));
  let html = `<div class="section-title">⏰ DEADLINES &amp; REMINDERS — ${BIZ[biz].name}</div>`;
  if (ui.showForm.dl) {
    html += `<div class="form-panel">

      <div class="grid2"><input id="dl-date" type="date"><input id="dl-note" placeholder="Note (optional)"></div>
      <div class="row"><button class="btn btn-red" style="flex:1" onclick="addDl('${biz}')">💾 SAVE DEADLINE</button>
      <button class="btn btn-ghost" onclick="ui.showForm.dl=false;render()">CANCEL</button></div></div>`;
  } else {
    html += `<button class="btn-dashed" style="margin-bottom:12px" onclick="ui.showForm.dl=true;render()">➕ ADD DEADLINE</button>`;
  }
  if (!rows.length) html += `<div class="empty">No deadlines tracked for ${BIZ[biz].short}.</div>`;
  html += `<div class="col">` + rows.map(d=>{
    const n=daysUntil(d.date);
    const badge = d.done ? `<span class="chip" style="background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.4)">DONE</span>`
      : n<0 ? `<span class="chip" style="background:rgba(239,68,68,0.14);color:#ef4444;border:1px solid rgba(239,68,68,0.4)">${-n}D OVERDUE</span>`
      : n===0 ? `<span class="chip" style="background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.4)">TODAY</span>`
      : `<span class="chip" style="background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.4)">IN ${n}D</span>`;
    return `<div class="card" style="padding:13px 16px;display:flex;align-items:center;gap:12px;${d.done?'opacity:0.55':''}">
      <div onclick="toggleDl('${d.id}')" title="Toggle done" style="width:22px;height:22px;border-radius:6px;border:1px solid ${d.done?'var(--green)':'rgba(255,255,255,0.15)'};display:flex;align-items:center;justify-content:center;color:var(--green);cursor:pointer;flex-shrink:0">${d.done?"✓":""}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;color:#e2e8f0;margin-bottom:2px;${d.done?'text-decoration:line-through':''}">${esc(d.title)}</div>
        <div style="font-size:13px;color:#8794ab">${new Date(d.date+"T12:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}${d.note?` · ${esc(d.note)}`:''}</div>
      </div>
      ${badge}<button class="del-x" onclick="delDl('${d.id}')">×</button>
    </div>`;
  }).join("") + `</div>`;
  return html;
}
function addDl(biz){
  const t=document.getElementById("dl-title").value.trim(), dt=document.getElementById("dl-date").value;
  if(!t||!dt) return;
  _state.deadlines.push({ id:uid("dl"), biz, title:t, date:dt, note:document.getElementById("dl-note").value.trim(), done:false });

}
function toggleDl(id){ const d=_state.deadlines.find(x=>x.id===id); d.done=!d.done; commit(); }

function parseAutofill(text){

    v = v.replace(/^[\s:#.,\-–—]+/,"").trim();

    return v;
  };

    if (v && !BP_CITYZIP.test(v) && lines[idx+1] && BP_CITYZIP.test(lines[idx+1])) v += ", "+lines[idx+1];
    if (!v){
      for (let j=idx+1; j<=idx+3 && j<lines.length; j++){

          break;
        }

  for (let i=0; i<lines.length; i++){

        const at = low.indexOf(kw);

        else if (lines[i+1] && lines[i+1].length <= 120 && !/[:：]\s*$/.test(lines[i+1])) put(f.k, lines[i+1], 2);
        break;

    }

  // PASS 2 — pattern scan with context checked in a ±1 line window
  for (const [k, pair] of Object.entries(BP_RX)){
    if (best[k] && best[k].score >= 2) continue;
    const rx = pair[0], ctx = pair[1];
    for (let i=0; i<lines.length; i++){
      const win = (lines[i-1]||"")+" "+lines[i]+" "+(lines[i+1]||"");
      if (ctx && !ctx.test(win)) continue;
      const m = lines[i].match(rx);
      if (m){ put(k, m[0], 1); break; }
    }
  }

  if (!best.legalName){
    const m = lines.find(l=>l.length<70 && /^[A-Z0-9][\w .,&'()\-]{2,60}\b(LLC|L\.L\.C\.?|INC\.?|CORP\.?|CORPORATION|COMPANY|CO\.)\s*$/i.test(l));
    if (m) put("legalName", m, 1);
  }
  if (!best.entityType){
    const t = text.toLowerCase();
    if (/limited liability company|\bl\.?l\.?c\b/.test(t)) put("entityType","LLC",1);
    else if (/\bcorporation\b|\bincorporated\b|\binc\b/.test(t)) put("entityType","Corporation",1);
    else if (/sole proprietor/.test(t)) put("entityType","Sole Proprietorship",1);
    else if (/\bpartnership\b/.test(t)) put("entityType","Partnership",1);
  }
  if (!best.stateFormation){
    let m = text.match(new RegExp("(?:state of|laws of(?: the state of)?|organized in|formed in|incorporated in)\\s+("+BP_STATES+")","i"));
    if (!m) m = text.match(new RegExp("\\b("+BP_STATES+")\\b(?=\\s+(?:limited liability|llc|corporation|inc\\b|profit corporation))","i"));

  if (!best.ein){
    const m = text.match(/\b(\d{2})\s*[- ]\s*(\d{7})\b/);

  if (!best.stateRegNum){
    const m = text.match(/\b[A-Z]\d{11,}\b|\b[A-Z]{1,3}\d{8,12}\b/);
    if (m && /document|filing|filed|registration|articles|entity|charter/i.test(text)) put("stateRegNum", m[0], 1);
  }

    const r = text.match(/routing[^\d]{0,14}(\d{9})\b/i), a = text.match(/account[^\d]{0,14}(\d{6,17})\b/i);

  }
  if (!best.principalAddr){
    const idx = lines.findIndex(l=>BP_STREET.test(l));
    if (idx>=0){
      let v = lines[idx];
      if (lines[idx+1] && BP_CITYZIP.test(lines[idx+1]) && !BP_CITYZIP.test(v)) v += ", "+lines[idx+1];
      put("principalAddr", v, 0.5);
    }
  }
  // ordered results
  const found = [];
  for (const f of fields){ if (best[f.k]) found.push({ k:f.k, label:f.label, value:best[f.k].v }); }
  return found;
}
function loadScript(src){
  return new Promise((res,rej)=>{
    if (document.querySelector(`script[src="${src}"]`)) return res();
    const s = document.createElement("script"); s.src = src;
    s.onload = res; s.onerror = ()=>rej(new Error("couldn't load " + src.split("/").pop() + " (check internet)"));
    document.head.appendChild(s);
  });
}

async function runAutofill(file, biz, mode){
  mode = mode || "bp";
  try {
    ui.afResults = null;
    saveAutofillFile(file, biz); // every autofill upload is auto-named + kept in Business Documents
    let text = "";
    if (file.type === "application/pdf" || /\.pdf$/i.test(file.name)){
      ui.afStatus = "Extracting text from PDF…"; render();
      await loadScript(PDFJS_URL);
      pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      const n = Math.min(pdf.numPages, 8);
      for (let p=1; p<=n; p++){
        const tc = await (await pdf.getPage(p)).getTextContent();
        text += tc.items.map(i=>i.str).join("\n") + "\n";
      }
      if (text.trim().length < 40){
        ui.afStatus = "That PDF is a scan with no selectable text — screenshot it and autofill from the image instead."; render(); return;
      }
    } else if (/\.(md|txt|csv|json|text)$/i.test(file.name||"") || (file.type && file.type.startsWith("text/"))){
      ui.afStatus = "Reading text file…"; render();
      text = await file.text();
    } else {
      ui.afStatus = "Reading the image with OCR — takes 10–30 seconds, runs entirely in your browser…"; render();
      await loadScript(TESS_URL);
      const res = await Tesseract.recognize(file, "eng");
      text = res.data.text || "";
    }
    const items = (mode==="fin" ? parseFin(text) : parseAutofill(text));
    if (!items.length){ ui.afStatus = "Couldn't confidently match any fields — try a clearer screenshot or a text PDF."; render(); return; }
    ui.afStatus = null;
    ui.afResults = { biz, items, mode };
    render();
  } catch(e){ ui.afStatus = "Autofill failed: " + e.message; render(); }
}

  });

}

const FIN_GROUPS = [
  ["bankacct","🏦 BANKING",[

const FIN_BANKS = /\b(chase|bank of america|wells fargo|truist|pnc|citibank|citizens|capital one|td bank|regions|us bank|fifth third|huntington|navy federal|chime|novo|bluevine|mercury|relay|axos|live oak|amex|american express)\b/i;
function parseFin(text){
  const lines = text.split(/\r?\n/).map(l=>l.replace(/[|•·]+/g," ").replace(/\s+/g," ").trim()).filter(l=>l.length>1);
  const best = {};
  const put=(k,v,score)=>{ v=(v||"").replace(/^[\s:#.,\-–—]+/,"").replace(/[\s;,]+$/,"").trim();
    if(v.length<1) return; if(!best[k]||score>best[k].score) best[k]={v:v.slice(0,220),score}; };
  const kwPass = [
    ["bankName",["bank name","financial institution","banking with","depository"]],
    ["acctNumber",["account number","account no","acct number","acct #"]],
    ["routingNumber",["routing number","routing no","aba number","aba routing"]],
    ["bankContact",["banker","branch contact","account manager","relationship manager"]],
    ["bankOnline",["online banking","login url","banking url"]],
    ["cardDue",["payment due","due date","statement date"]],
    ["cardApr",["apr","interest rate","purchase rate"]],
    ["paydex",["paydex"]],
    ["intelliscore",["intelliscore","experian score","experian business"]],
    ["equifax",["equifax business","equifax score"]],
    ["fico",["fico sbss","sbss"]],
    ["tradelines",["net-30","net 30","tradeline","trade line","vendor account"]],
    ["creditLimitTotal",["total credit","credit limit","credit line","available credit"]],
  ];
  for (let i=0;i<lines.length;i++){
    const low = lines[i].toLowerCase();
    for (const [k,kws] of kwPass){
      for (const kw of kws){
        const at = low.indexOf(kw);
        if (at<0) continue;
        if (at>0 && /[a-z0-9]/.test(low[at-1])) continue;
        let rest = lines[i].slice(at+kw.length).replace(/^[\s:#.\-–—]*/,"").trim();
        if (rest.length>=1) put(k, rest, 3);
        else if (lines[i+1] && lines[i+1].length<=120) put(k, lines[i+1], 2);
        break;
      }
    }
  }
  // pattern passes
  for (const l of lines){
    if (!best.routingNumber){ const m=l.match(/routing[^\d]{0,14}(\d{9})\b/i); if(m) put("routingNumber", m[1], 4); }
    if (!best.acctNumber){ const m=l.match(/acc(?:oun)?t[^\d]{0,14}(\d{6,17})\b/i); if(m) put("acctNumber", m[1], 4); }
    if (!best.acctType){ const m=l.match(/\b(business )?(checking|savings|money market)\b/i); if(m) put("acctType", m[0], 2); }
    if (!best.bankName){ const m=l.match(FIN_BANKS); if(m) put("bankName", l.length<60 ? l : m[0], 2); }
    if (!best.paydex){ const m=l.match(/paydex[^\d]{0,12}(\d{1,3})/i); if(m) put("paydex", m[1], 4); }
    if (!best.intelliscore){ const m=l.match(/intelliscore[^\d]{0,12}(\d{1,3})/i); if(m) put("intelliscore", m[1], 4); }
  }
  // credit cards: collect up to three distinct mentions
  const cardRx = /\b(visa|mastercard|master card|amex|american express|discover)\b[^\n]{0,40}?(?:ending(?: in)?|last 4|x{2,4}|\*{2,4})?[^\d]{0,6}(\d{4})\b/i;
  const seen = new Set(); let slot = 1;
  for (const l of lines){
    if (slot>3) break;
    const m = l.match(cardRx);
    if (!m || seen.has(m[2])) continue;
    seen.add(m[2]);
    const lim = l.match(/\$[\d,]+/);
    put("card"+slot, m[1].toUpperCase()+" ···"+m[2]+(lim?" · limit "+lim[0]:""), 3);
    slot++;
  }
  const fields = FIN_GROUPS.flatMap(([g,t,fs])=>fs.map(([k,label])=>({k,label})));
  const found = [];
  for (const f of fields){ if (best[f.k]) found.push({ k:f.k, label:f.label, value:best[f.k].v }); }
  return found;
}

// Centauri World logo (SVG recreation: blue dot-sphere globe + wordmark)
function centauriGlobeDots() {
  // regular dot lattice clipped to a sphere, with a circular cut-out on the
  // right that carves the crescent "C" — dots swell toward the sphere's center
  let dots = "";
  const cx=60, cy=60, R=47, step=6.9;
  const kx=cx+R*0.62, kr=R*0.78;
  let row=0;
  for (let y=cy-R+4; y<=cy+R-3; y+=step, row++) {
    const off=(row%2)*step/2;
    for (let x=cx-R+2+off; x<=cx+R; x+=step) {
      const r=Math.hypot(x-cx,y-cy);
      if (r>R-2) continue;                      // outside sphere
      if (Math.hypot(x-kx,y-cy)<kr) continue;    // inside cut-out → crescent
      const s=1.0+2.9*Math.sqrt(Math.max(0,1-(r/R)*(r/R)));
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${s.toFixed(2)}" fill="#1A6AE8"/>`;
    }
  }
  return dots;
}

}
async function connectDocsFolder(biz) {
  if (!window.showDirectoryPicker) { ui.docStatus="Folder connect needs Chrome, Edge, or Brave."; render(); return; }
  try {
    const h = await window.showDirectoryPicker({ mode: "read" });
    await idbSet("docs-"+biz, h);
    _state.docs[biz].scan.folderName = h.name;
    ui.docStatus = "Folder \""+h.name+"\" connected — click ⟳ UPDATE to pull the file list.";
    commit(); return;
  } catch(e) { if (e.name!=="AbortError") ui.docStatus="Couldn't connect folder: "+e.message; }
  render();
}
async function scanDocs(biz) {
  ui.docStatus = "Scanning…"; render();
  try {
    const h = await idbGet("docs-"+biz);
    if (!h) { ui.docStatus="No folder connected yet — click ◇ CONNECT OBSIDIAN FOLDER first."; render(); return; }
    let perm = await h.queryPermission({mode:"read"});
    if (perm!=="granted") perm = await h.requestPermission({mode:"read"});
    if (perm!=="granted") { ui.docStatus="Folder permission was denied."; render(); return; }
    const files = [];
    for await (const entry of h.values()) {
      if (entry.kind!=="file") continue;
      const f = await entry.getFile();
      files.push({ name:f.name, size:f.size, mtime:f.lastModified });
      if (files.length>=300) break;
    }
    files.sort((a,b)=>b.mtime-a.mtime);
    _state.docs[biz].scan = { files, lastScan: Date.now(), folderName: h.name };
    ui.docStatus = "✓ Pulled "+files.length+" file(s) from \""+h.name+"\"";
    commit();
  } catch(e) { ui.docStatus="Scan failed: "+e.message; render(); }
}
async function openScanFile(biz, idx) {
  try {
    const h = await idbGet("docs-"+biz);
    const meta = _state.docs[biz].scan.files[idx];
    const fh = await h.getFileHandle(meta.name);
    const f = await fh.getFile();
    window.open(URL.createObjectURL(f), "_blank");
  } catch(e) { ui.docStatus="Couldn't open file: "+e.message; render(); }
}
async function autofillFromScan(biz, idx){
  try {
    const h = await idbGet("docs-"+biz);
    const meta = _state.docs[biz].scan.files[idx];
    const f = await (await h.getFileHandle(meta.name)).getFile();
    runAutofill(f, biz);
  } catch(e){ ui.docStatus = "Couldn't read that file: " + e.message; render(); }
}
function pickDocFiles(biz){ const i=document.getElementById("docFile"); i.dataset.biz=biz; i.click(); }
function addDocFiles(fileList, biz) {
  const files=[...fileList]; if(!files.length) return;
  let pending=files.length;
  files.forEach(f=>{
    const entry={ id:uid("doc"), name:f.name||("screenshot-"+new Date().toISOString().slice(0,19).replace(/[:T]/g,"-")+".png"),
      type:f.type||"", size:f.size, ts:Date.now(), dataUri:null, ref:false };
    if (f.size > 3*1048576) { entry.ref=true; _state.docs[biz].files.unshift(entry); if(--pending===0) finishDocAdd(biz,files.length); return; }
    const r=new FileReader();
    r.onload=()=>{ entry.dataUri=r.result; _state.docs[biz].files.unshift(entry); if(--pending===0) finishDocAdd(biz,files.length); };
    r.readAsDataURL(f);
  });
}
function finishDocAdd(biz,n){
  try { save(); ui.docStatus="✓ Saved "+n+" file(s)."; }
  catch(e){ ui.docStatus="Storage is full — file kept as reference only. Delete some saved files to free space."; }
  render();
}
function renameDocFile(biz,id){
  const f=_state.docs[biz].files.find(x=>x.id===id); if(!f) return;
  const n=prompt("Rename file:", f.name);
  if(n && n.trim()){ f.name=n.trim(); commit(); }
}
function delDocFile(biz,id){ _state.docs[biz].files=_state.docs[biz].files.filter(f=>f.id!==id); commit(); }
function openSavedDoc(biz,id){
  const f=_state.docs[biz].files.find(x=>x.id===id);
  if(!f) return;
  if(!f.dataUri){ ui.docStatus="\""+f.name+"\" was too big to store — it's listed as a reference only."; render(); return; }
  fetch(f.dataUri).then(r=>r.blob()).then(b=>window.open(URL.createObjectURL(new Blob([b],{type:f.type||b.type})),"_blank"));
}
function addDocLink(biz){
  const url=document.getElementById("dk-url").value.trim(); if(!url) return;
  const label=document.getElementById("dk-label").value.trim();
  const bucket=document.getElementById("dk-dnb").checked?"dnb":"links";
  _state.docs[biz][bucket].push({ id:uid("lnk"), label, url: /^https?:\/\//i.test(url)?url:"https://"+url });
  ui.showForm.dlink=false; commit();
}
function delDocLink(biz,bucket,id){ _state.docs[biz][bucket]=_state.docs[biz][bucket].filter(l=>l.id!==id); commit(); }

// ---------- Data backup: move your data between devices ----------
function exportData(){
  const blob = new Blob([JSON.stringify(_state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "big-business-data-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
}
document.getElementById("dataFile").addEventListener("change", e=>{
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try {
      const s=JSON.parse(r.result);
      if(!s.projects || !s.profiles) throw new Error("not a Big Business backup");
      if(!confirm("Replace ALL current data with this backup?")) return;
      _state=s; migrate(); commit();
      alert("Data imported.");
    } catch(err){ alert("Couldn't import: "+err.message); }
  };
  r.readAsText(f);
});
